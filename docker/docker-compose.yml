version: "3.9"

# Run locally: docker compose up
# Then open: http://localhost:5000

services:
  app:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=local
      - APP_VERSION=v1-local
      - APP_COLOR=#0078d4
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 3s
      retries: 3
