# BASE values — these are the defaults.
# Each environment overrides only what's different.

image:
  repository: YOUR_DOCKERHUB_USERNAME/devops101   # ← set in CI or override
  tag: "latest"
  pullPolicy: Always

replicaCount: 1

app:
  env: "dev"
  version: "v1"
  color: "#0078d4"   # blue default

service:
  port: 80
  targetPort: 5000
  type: ClusterIP

ingress:
  enabled: true
  className: nginx

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  cpuTarget: 60
