---
# PROD — manual sync only (you press the button in Argo CD UI)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops101-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/devops-101  # ← update
    targetRevision: HEAD
    path: helm/devops101
    helm:
      valueFiles:
        - ../../gitops/prod/values-prod.yaml
      set:
        - name: image.repository
          value: YOUR_DOCKERHUB_USERNAME/devops101               # ← update
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  # NO syncPolicy here = manual sync only
  syncOptions:
    - CreateNamespace=true
